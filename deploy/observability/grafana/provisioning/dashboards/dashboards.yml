# Provider de dashboards: carga todo lo que haya en ../../dashboards (montado
# en el container en /var/lib/grafana/dashboards, ver docker-compose.observability.yml).
apiVersion: 1

providers:
  - name: streamhub
    orgId: 1
    folder: StreamHub
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
