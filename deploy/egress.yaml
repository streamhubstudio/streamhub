# LiveKit Egress config — TEMPLATE (grabacion / RTMP out / HLS).
# Se pasa al contenedor via -e EGRESS_CONFIG_BODY="$(cat egress.yaml)".
# El contenedor monta un volumen para los archivos: -v /opt/livekit/recordings:/out
redis:
  address: localhost:6379
ws_url: ws://localhost:7880
api_key: <API_KEY>
api_secret: <API_SECRET>
insecure: false
log_level: info
