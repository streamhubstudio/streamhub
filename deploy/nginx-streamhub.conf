# StreamHub — UN SOLO dominio, UN SOLO servicio Node.
# /rtc -> LiveKit signaling (wss). Todo lo demas -> streamhub-core (NestJS), que sirve API + SPA React.
# Reemplazar streamhub.example.com. `certbot --nginx` agrega el bloque 443 (SSL) + redirect 80->443.
server {
    listen 80;
    listen [::]:80;
    server_name streamhub.example.com;
    client_max_body_size 50m;

    # --- LiveKit signaling (WebRTC) — el cliente conecta a wss://streamhub.example.com ---
    location /rtc {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # --- /metrics NO se expone al exterior ---
    # Prometheus scrapea el core en 127.0.0.1:3020/metrics directo (localhost),
    # asi que aca lo bloqueamos. Va ANTES de `location /` (match exacto gana).
    location = /metrics {
        deny all;
        return 403;
    }

    # --- streamhub-core (NestJS): API (/api/v1) + SPA React (estaticos + fallback) ---
    location / {
        proxy_pass http://127.0.0.1:3020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }
}
